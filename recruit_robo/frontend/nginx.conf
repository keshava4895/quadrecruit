server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to backend container app (strips /api prefix)
    # e.g. /api/jobs/ -> http://ca-quadrecruit-backend/jobs/
    location /api/ {
        proxy_pass http://ca-quadrecruit-backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback — required for React Router client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
