server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to backend container app (strips /api prefix)
    # e.g. /api/jobs/ -> http://ca-quadrecruit-backend/jobs/
    location /api/ {
        proxy_pass https://ca-quadrecruit-backend.internal.nicemoss-3f1a87f7.eastus.azurecontainerapps.io/;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name ca-quadrecruit-backend.internal.nicemoss-3f1a87f7.eastus.azurecontainerapps.io;
        proxy_set_header Host ca-quadrecruit-backend.internal.nicemoss-3f1a87f7.eastus.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback — required for React Router client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
