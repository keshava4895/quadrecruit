name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GHCR_OWNER: keshava4895
  RESOURCE_GROUP: quadrecruit-rg
  BACKEND_APP: ca-quadrecruit-backend
  FRONTEND_APP: ca-quadrecruit-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ghcr.io/${{ env.GHCR_OWNER }}/quadrecruit-backend:${{ github.sha }} ./recruit_robo/backend
          docker push ghcr.io/${{ env.GHCR_OWNER }}/quadrecruit-backend:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/${{ env.GHCR_OWNER }}/quadrecruit-frontend:${{ github.sha }} ./recruit_robo/frontend
          docker push ghcr.io/${{ env.GHCR_OWNER }}/quadrecruit-frontend:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ghcr.io/${{ env.GHCR_OWNER }}/quadrecruit-backend:${{ github.sha }}

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ghcr.io/${{ env.GHCR_OWNER }}/quadrecruit-frontend:${{ github.sha }}
